version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beehayb-postgres
    environment:
      POSTGRES_DB: beehayb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: beehayb-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    environment:
      - MOSQUITTO_USERNAME=beehayb_user
      - MOSQUITTO_PASSWORD=beehayb_pass

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beehayb-backend
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=beehayb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - MQTT_BROKER=mqtt://mosquitto:1883
      - MQTT_USER=beehayb_user
      - MQTT_PASS=beehayb_pass
      - PORT=5000
      - NODE_ENV=development
      - JWT_SECRET=dev_secret_key_change_in_production
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_logs:

networks:
  default:
    name: beehayb-network
